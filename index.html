<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f766e">
<title>The Way to English · Book 1 — Professor IA</title>
<style>
  :root{
    --bg:#f7f8fa;
    --surface:#ffffff;
    --ink:#1a1f2e;
    --muted:#8a93a6;
    --line:#eceef3;
    --accent:#0f766e;
    --accent-soft:#e9f4f1;
    --bot:#f1f3f7;
    --err-bg:#fef2f2;
    --err-ink:#b42318;
    --err-line:#fecaca;
    --radius:18px;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 12px 32px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    display:flex;flex-direction:column;height:100dvh;
    max-width:760px;margin:0 auto;background:var(--surface);
    box-shadow:var(--shadow);
  }

  /* ---------- Header ---------- */
  header{
    display:flex;align-items:center;gap:12px;
    padding:14px 20px;border-bottom:1px solid var(--line);
    background:var(--surface);position:relative;z-index:2;
  }
  .avatar{
    width:42px;height:42px;border-radius:50%;flex:none;
    display:grid;place-items:center;color:#fff;font-weight:700;font-size:18px;
    background:linear-gradient(145deg,#0f766e,#14a08a);
    box-shadow:0 4px 12px rgba(15,118,110,.28);
  }
  .head-txt{min-width:0;flex:1;overflow:hidden}
  .head-txt h1{font-size:15.5px;font-weight:650;letter-spacing:-.01em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .head-txt p{font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.18)}

  /* ---------- Log ---------- */
  #log{
    flex:1;overflow-y:auto;padding:22px 20px 8px;
    display:flex;flex-direction:column;gap:12px;
    scroll-behavior:smooth;
  }
  #log::-webkit-scrollbar{width:8px}
  #log::-webkit-scrollbar-thumb{background:#e2e5ec;border-radius:8px}
  #log::-webkit-scrollbar-thumb:hover{background:#cfd4de}

  .row{display:flex;width:100%;animation:rise .28s cubic-bezier(.21,.9,.3,1)}
  .row.me{justify-content:flex-end}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .msg{
    max-width:78%;padding:11px 15px;font-size:14.5px;line-height:1.55;
    white-space:pre-wrap;word-wrap:break-word;border-radius:var(--radius);
  }
  .msg.bot{background:var(--bot);color:var(--ink);border-bottom-left-radius:6px}
  .msg.me{background:var(--accent);color:#fff;border-bottom-right-radius:6px}
  .msg.err{background:var(--err-bg);color:var(--err-ink);border:1px solid var(--err-line);border-bottom-left-radius:6px;font-size:13.5px}
  .msg strong{font-weight:650}
  .msg code{background:rgba(15,118,110,.1);padding:1px 5px;border-radius:6px;font-size:.9em;font-family:ui-monospace,Menlo,Consolas,monospace}
  .msg.me code{background:rgba(255,255,255,.18)}
  .msg a{color:inherit;text-decoration:underline}

  /* pronunciation coach card */
  .coach{
    align-self:flex-start;max-width:82%;background:#fff;
    border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:12px;padding:10px 13px;font-size:13.5px;line-height:1.5;
  }
  .coach .top{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-weight:600;color:var(--ink)}
  .coach .score{margin-left:auto;font-weight:700;font-size:11.5px;padding:2px 9px;border-radius:999px;color:#fff}
  .coach .heard{color:var(--muted);font-style:italic;margin-bottom:4px}
  .coach .fb{color:#374151}

  /* header action buttons */
  .head-actions{display:flex;gap:4px;flex:none}
  .hbtn{
    width:40px;height:40px;border:0;border-radius:50%;background:transparent;
    display:grid;place-items:center;cursor:pointer;color:var(--muted);transition:.15s;
  }
  .hbtn:hover{background:#eef0f4;color:var(--ink)}
  .hbtn.active{color:var(--accent)}
  .hbtn svg{width:21px;height:21px}
  .hbtn.call{background:var(--accent);color:#fff}
  .hbtn.call:hover{background:#0c635c;color:#fff}

  /* ---------- Call overlay ---------- */
  .call{
    position:fixed;inset:0;z-index:50;display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:30px;
    background:radial-gradient(120% 120% at 50% 0%,#10897c 0%,#0b5e57 55%,#08433e 100%);
    color:#fff;text-align:center;padding:30px;
  }
  .call.show{display:flex;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .call .who{font-size:19px;font-weight:650;letter-spacing:-.01em}
  .orb{
    width:150px;height:150px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#eafff8,#bfeee3 45%,#6fccbb 100%);
    box-shadow:0 0 0 0 rgba(255,255,255,.45);position:relative;
    transition:transform .2s;
  }
  .orb.listening{animation:orbPulse 1.5s ease-in-out infinite}
  .orb.speaking{animation:orbSpeak .7s ease-in-out infinite}
  .orb.thinking{animation:orbThink 1.1s linear infinite}
  @keyframes orbPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.45);transform:scale(1)}50%{box-shadow:0 0 0 26px rgba(255,255,255,0);transform:scale(1.05)}}
  @keyframes orbSpeak{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  @keyframes orbThink{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(.95)}100%{transform:rotate(360deg) scale(1)}}
  .call .status{font-size:14.5px;opacity:.9;min-height:20px}
  .call-actions{display:flex;gap:16px;margin-top:6px}
  .cbtn{
    width:62px;height:62px;border-radius:50%;border:0;cursor:pointer;
    display:grid;place-items:center;color:#fff;background:rgba(255,255,255,.16);transition:.15s;
  }
  .cbtn:hover{background:rgba(255,255,255,.26)}
  .cbtn.end{background:#ef4444}
  .cbtn.end:hover{background:#dc2626}
  .cbtn.muted{background:#fff;color:#0b5e57}
  .cbtn svg{width:26px;height:26px}
  .cbtn-lbl{display:block;font-size:11px;opacity:.8;margin-top:7px}

  /* typing dots */
  .typing{display:inline-flex;gap:4px;align-items:center;padding:14px 16px}
  .typing span{
    width:7px;height:7px;border-radius:50%;background:#9aa3b5;
    animation:blink 1.3s infinite both;
  }
  .typing span:nth-child(2){animation-delay:.18s}
  .typing span:nth-child(3){animation-delay:.36s}
  @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}

  /* ---------- Composer ---------- */
  form{
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);background:var(--surface);
  }
  .bar{
    display:flex;align-items:flex-end;gap:8px;
    background:var(--bg);border:1px solid var(--line);
    border-radius:24px;padding:6px 6px 6px 8px;
    transition:border-color .15s,box-shadow .15s;
  }
  .bar:focus-within{border-color:#cdd9d6;box-shadow:0 0 0 4px var(--accent-soft)}
  #inp{
    flex:1;border:0;background:transparent;resize:none;outline:none;
    font:inherit;font-size:14.5px;line-height:1.5;color:var(--ink);
    padding:9px 4px;max-height:140px;
  }
  #inp::placeholder{color:var(--muted)}

  .icon-btn{
    flex:none;width:42px;height:42px;border:0;border-radius:50%;
    display:grid;place-items:center;cursor:pointer;
    background:transparent;color:var(--muted);transition:.15s;
  }
  .icon-btn:hover{background:#eef0f4;color:var(--ink)}
  .icon-btn svg{width:21px;height:21px}

  #b{background:var(--accent);color:#fff}
  #b:hover{background:#0c635c;color:#fff}
  #b:disabled{background:#cfd6e0;cursor:default}

  #mic.rec{background:#ef4444;color:#fff;animation:pulse 1.4s infinite}
  #mic.rec:hover{background:#dc2626}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.45)}50%{box-shadow:0 0 0 7px rgba(239,68,68,0)}}

  .hint{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}

  @media(max-width:600px){
    .app{box-shadow:none}
    .msg{max-width:85%}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="avatar">W</div>
    <div class="head-txt">
      <h1>The Way to English · Book 1</h1>
      <p><span class="dot"></span> Professor de inglês — escreva ou fale</p>
    </div>
    <div class="head-actions">
      <button id="spk" class="hbtn active" type="button" title="Voz do professor (ligado)" aria-label="Voz">
        <svg id="spkIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/>
        </svg>
      </button>
      <button id="callBtn" class="hbtn call" type="button" title="Iniciar chamada" aria-label="Chamada">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="log"></div>

  <form id="f">
    <div class="bar">
      <button id="mic" class="icon-btn" type="button" title="Falar" aria-label="Gravar áudio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="18" x2="12" y2="22"/>
        </svg>
      </button>
      <textarea id="inp" rows="1" placeholder="Escreva sua mensagem..." autocomplete="off" autofocus></textarea>
      <button id="b" class="icon-btn" type="submit" title="Enviar" aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="hint">Enter envia · Shift+Enter quebra linha</div>
  </form>
</div>

<!-- Overlay de chamada de áudio -->
<div id="call" class="call">
  <div class="who">Teacher Way</div>
  <div id="orb" class="orb"></div>
  <div id="callStatus" class="status">Conectando…</div>
  <div class="call-actions">
    <div style="text-align:center">
      <button id="muteBtn" class="cbtn" type="button" title="Mudo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="18" x2="12" y2="22"/>
        </svg>
      </button>
      <span class="cbtn-lbl">Microfone</span>
    </div>
    <div style="text-align:center">
      <button id="endBtn" class="cbtn end" type="button" title="Encerrar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z" transform="rotate(135 12 12)"/>
        </svg>
      </button>
      <span class="cbtn-lbl">Encerrar</span>
    </div>
  </div>
</div>

<script>
  const AGENT = "https://n8nn.discloud.app/webhook/agente-ingles";
  const PRON  = "https://n8nn.discloud.app/webhook/pronuncia";
  const FALAR = "https://n8nn.discloud.app/webhook/falar";
  const sessionId = "web-" + Date.now() + "-" + Math.random().toString(36).slice(2,8);

  const log  = document.getElementById("log");
  const form = document.getElementById("f");
  const inp  = document.getElementById("inp");
  const btn  = document.getElementById("b");
  const mic  = document.getElementById("mic");
  let lastBotText = "";

  // voz / chamada
  let speakerOn = true;            // professor fala em voz alta
  let inCall = false, micMuted = false;
  const audioEl = new Audio();
  const spk = document.getElementById("spk");
  const spkIcon = document.getElementById("spkIcon");

  // ---- minimal & safe markdown (escape first, then bold/italic/code) ----
  function esc(t){ return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function fmt(t){
    return esc(t)
      .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
      .replace(/(^|[\s(])\*([^*\n]+)\*/g,"$1<em>$2</em>")
      .replace(/`([^`]+)`/g,"<code>$1</code>");
  }

  function add(text, cls){
    const row = document.createElement("div");
    row.className = "row " + (cls === "me" ? "me" : "bot");
    const d = document.createElement("div");
    d.className = "msg " + cls;
    if(cls === "bot"){ d.innerHTML = fmt(text); lastBotText = text; } else d.textContent = text;
    row.appendChild(d); log.appendChild(row);
    log.scrollTop = log.scrollHeight;
    return row;
  }

  function addTyping(){
    const row = document.createElement("div");
    row.className = "row bot";
    row.innerHTML = '<div class="msg bot typing"><span></span><span></span><span></span></div>';
    log.appendChild(row); log.scrollTop = log.scrollHeight;
    return row;
  }

  // ---- card de avaliação de pronúncia ----
  function addCoach(d){
    let score = parseInt(d.score); if(isNaN(score)) score = 0;
    score = Math.max(0, Math.min(100, score));
    const color = score>=80 ? "#16a34a" : score>=60 ? "#d97706" : "#dc2626";
    const heard = (d.heard||"").trim(), target = (d.target||"").trim();
    const row = document.createElement("div"); row.className = "row";
    const card = document.createElement("div"); card.className = "coach";
    let html = '<div class="top">🗣️ Pronúncia <span class="score" style="background:'+color+'">'+score+'/100</span></div>';
    if(heard && heard.toLowerCase() !== target.toLowerCase())
      html += '<div class="heard">Ouvi: "'+esc(heard)+'"</div>';
    if(d.feedback) html += '<div class="fb">'+esc(d.feedback)+'</div>';
    card.innerHTML = html; row.appendChild(card); log.appendChild(row);
    log.scrollTop = log.scrollHeight;
  }

  add("Hello! 👋 Sou seu professor de inglês baseado no livro *The Way to English — Book 1*. Pode escrever ou falar no microfone. What's your name?", "bot");

  // ---- auto-grow textarea ----
  function autogrow(){ inp.style.height = "auto"; inp.style.height = Math.min(inp.scrollHeight,140) + "px"; }
  inp.addEventListener("input", autogrow);
  inp.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); form.requestSubmit(); }
  });

  // ---- texto -> voz (ElevenLabs via n8n) ----
  async function speak(text){
    if(!text) return;
    try{
      const r = await fetch(FALAR, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ text }) });
      if(!r.ok) return;
      const blob = await r.blob();
      if(audioEl.src) URL.revokeObjectURL(audioEl.src);
      audioEl.src = URL.createObjectURL(blob);
      await audioEl.play();
      await new Promise(res => { audioEl.onended = res; audioEl.onerror = res; });
    }catch(e){ /* sem voz não quebra a conversa */ }
  }

  // ---- conversa com o professor; retorna o texto da resposta ----
  async function askTeacher(text){
    const r = await fetch(AGENT, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ message:text, sessionId }) });
    if(!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    return data.response || data.output || "(resposta vazia)";
  }

  async function sendToTeacher(text, showUser){
    if(showUser) add(text, "me");
    btn.disabled = true; const typing = addTyping();
    try{
      const reply = await askTeacher(text);
      typing.remove(); add(reply, "bot");
      if(speakerOn) speak(reply);
    }catch(err){ typing.remove(); add("Não consegui falar com o professor agora. " + err.message, "err"); }
    finally{ btn.disabled = false; inp.focus(); }
  }

  // ---- toggle da voz ----
  spk.addEventListener("click", ()=>{
    speakerOn = !speakerOn;
    spk.classList.toggle("active", speakerOn);
    spk.title = "Voz do professor (" + (speakerOn?"ligado":"desligado") + ")";
    spkIcon.innerHTML = speakerOn
      ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/>'
      : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
    if(!speakerOn){ try{ audioEl.pause(); }catch(e){} }
  });

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = inp.value.trim(); if(!text) return;
    inp.value = ""; autogrow();
    sendToTeacher(text, true);
  });

  // ---- captura PCM cru -> WAV 16k mono (robusto, sem MediaRecorder/decodeAudioData) ----
  let _ac = null;
  function getAC(){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!_ac) _ac = new AC();
    if(_ac.state === "suspended"){ _ac.resume(); }
    return _ac;
  }
  function ab2b64(buf){
    let bin = ""; const bytes = new Uint8Array(buf), chunk = 0x8000;
    for(let i=0;i<bytes.length;i+=chunk) bin += String.fromCharCode.apply(null, bytes.subarray(i,i+chunk));
    return btoa(bin);
  }
  function mergeBuffers(chunks){
    let len = 0; for(const c of chunks) len += c.length;
    const out = new Float32Array(len); let o = 0;
    for(const c of chunks){ out.set(c, o); o += c.length; }
    return out;
  }
  function downsample(buf, inRate, outRate){
    if(outRate >= inRate) return buf;
    const ratio = inRate / outRate, newLen = Math.round(buf.length / ratio);
    const out = new Float32Array(newLen);
    for(let i=0;i<newLen;i++){
      const idx = i*ratio, i0 = Math.floor(idx), i1 = Math.min(i0+1, buf.length-1), f = idx-i0;
      out[i] = buf[i0]*(1-f) + buf[i1]*f;
    }
    return out;
  }
  function encodeWav(samples, rate){
    const buf = new ArrayBuffer(44 + samples.length*2), v = new DataView(buf);
    const w = (o,s)=>{ for(let i=0;i<s.length;i++) v.setUint8(o+i, s.charCodeAt(i)); };
    w(0,"RIFF"); v.setUint32(4,36+samples.length*2,true); w(8,"WAVE");
    w(12,"fmt "); v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
    v.setUint32(24,rate,true); v.setUint32(28,rate*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
    w(36,"data"); v.setUint32(40,samples.length*2,true);
    let o=44; for(let i=0;i<samples.length;i++){ let s=Math.max(-1,Math.min(1,samples[i])); v.setInt16(o, s<0?s*0x8000:s*0x7FFF, true); o+=2; }
    return buf;
  }
  function samplesToWavB64(samples, rate){
    return ab2b64(encodeWav(downsample(samples, rate, 16000), 16000));
  }
  function createPcmRecorder(stream){
    const ac = getAC();
    const src = ac.createMediaStreamSource(stream);
    const proc = ac.createScriptProcessor(4096, 1, 1);
    const sink = ac.createGain(); sink.gain.value = 0;   // sem feedback no alto-falante
    const chunks = []; const rec = { rms:0, sampleRate:ac.sampleRate, _stopped:false };
    proc.onaudioprocess = (e)=>{
      if(rec._stopped) return;
      const ch = e.inputBuffer.getChannelData(0);
      chunks.push(new Float32Array(ch));
      let s = 0; for(let i=0;i<ch.length;i++) s += ch[i]*ch[i];
      rec.rms = Math.sqrt(s/ch.length);
    };
    src.connect(proc); proc.connect(sink); sink.connect(ac.destination);
    rec.stop = ()=>{ rec._stopped = true; try{ src.disconnect(); proc.disconnect(); sink.disconnect(); }catch(e){} return { samples:mergeBuffers(chunks), sampleRate:ac.sampleRate }; };
    return rec;
  }
  async function avaliarPronuncia(samples, rate){
    const b64 = samplesToWavB64(samples, rate);
    const r = await fetch(PRON, { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ audioBase64:b64, format:"wav", sessionId, context:lastBotText }) });
    if(!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  }

  // ---- microfone (chat) -> avaliação de pronúncia + conversa ----
  let pcmRec=null, recStream=null, recording=false;
  mic.addEventListener("click", async () => {
    if(!recording){
      try{
        recStream = await navigator.mediaDevices.getUserMedia({audio:true});
        pcmRec = createPcmRecorder(recStream);
        recording = true; mic.classList.add("rec"); mic.title = "Parar";
      }catch(err){ add("Sem acesso ao microfone: " + err.message, "err"); }
    } else {
      recording = false; mic.classList.remove("rec"); mic.title = "Falar";
      const cap = pcmRec.stop();
      if(recStream){ recStream.getTracks().forEach(t=>t.stop()); recStream = null; }
      mic.disabled = true; const typing = addTyping();
      try{
        if(cap.samples.length < cap.sampleRate*0.3){ typing.remove(); add("Áudio muito curto — segure o microfone e fale um pouco mais.", "err"); return; }
        const d = await avaliarPronuncia(cap.samples, cap.sampleRate); typing.remove();
        const said = (d.target || d.heard || "").trim();
        if(!said){ add("Não entendi o áudio, pode repetir?", "err"); return; }
        add(said, "me"); addCoach(d);
        await sendToTeacher(said, false);
      }catch(err){ typing.remove(); add("Erro ao avaliar o áudio: " + err.message, "err"); }
      finally{ mic.disabled = false; }
    }
  });

  // =================== MODO CHAMADA (hands-free) ===================
  const callEl     = document.getElementById("call");
  const orb        = document.getElementById("orb");
  const callStatus = document.getElementById("callStatus");
  const callBtn    = document.getElementById("callBtn");
  const muteBtn    = document.getElementById("muteBtn");
  const endBtn     = document.getElementById("endBtn");
  let callStream = null, abortRec = null;

  function wait(ms){ return new Promise(r => setTimeout(r, ms)); }
  async function fetchJson(url, body){
    const r = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
    if(!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  }
  function setOrb(state, text){ orb.className = "orb " + (state||""); if(text != null) callStatus.textContent = text; }

  callBtn.addEventListener("click", startCall);
  endBtn.addEventListener("click", endCall);
  muteBtn.addEventListener("click", ()=>{
    micMuted = !micMuted;
    muteBtn.classList.toggle("muted", micMuted);
    if(micMuted){ if(abortRec) abortRec(); setOrb("", "Microfone mudo"); }
  });

  async function startCall(){
    if(inCall) return;
    try{ callStream = await navigator.mediaDevices.getUserMedia({audio:true}); }
    catch(err){ add("Sem acesso ao microfone: " + err.message, "err"); return; }
    inCall = true; micMuted = false; muteBtn.classList.remove("muted");
    callEl.classList.add("show");
    // desbloqueia o áudio dentro do gesto do clique (iOS)
    try{ audioEl.muted = true; await audioEl.play().catch(()=>{}); audioEl.pause(); audioEl.muted = false; }catch(e){}
    const hi = "Hello! Vamos conversar em inglês. What's your name?";
    add(hi, "bot");
    setOrb("speaking", "Falando…"); await speak(hi);
    callLoop();
  }

  function endCall(){
    inCall = false;
    if(abortRec) abortRec();
    if(callStream){ callStream.getTracks().forEach(t=>t.stop()); callStream = null; }
    try{ audioEl.pause(); }catch(e){}
    callEl.classList.remove("show");
  }

  async function callLoop(){
    while(inCall){
      if(micMuted){ await wait(300); continue; }
      setOrb("listening", "Pode falar…");
      const cap = await recordUntilSilence(callStream);
      if(!inCall) break;
      if(!cap){ continue; }                  // silêncio: escuta de novo
      setOrb("thinking", "Entendendo…");
      try{
        const pr = await avaliarPronuncia(cap.samples, cap.sampleRate);
        const said = (pr.target || pr.heard || "").trim();
        if(!said){ continue; }
        add(said, "me"); addCoach(pr);
        const reply = await askTeacher(said);
        if(!inCall) break;
        add(reply, "bot");
        setOrb("speaking", "Falando…"); await speak(reply);
      }catch(err){ setOrb("", "Ops… tente de novo"); await wait(900); }
    }
  }

  // grava até detectar ~1s de silêncio (VAD simples por RMS no PCM)
  function recordUntilSilence(stream){
    return new Promise(resolve => {
      let done = false, started = false;
      const rec = createPcmRecorder(stream);
      let silence = 0, t0 = performance.now();
      const finish = (val)=>{ if(done) return; done = true; abortRec = null; resolve(val); };
      abortRec = () => { rec.stop(); finish(null); };
      const tick = () => {
        if(done) return;
        if(!inCall || micMuted){ rec.stop(); finish(null); return; }
        const rms = rec.rms, now = performance.now();
        if(rms > 0.02){ started = true; silence = now; }
        const stop = (started && now - silence > 1000) || (now - t0 > 15000) || (!started && now - t0 > 8000);
        if(stop){ const cap = rec.stop(); finish((started && cap.samples.length) ? cap : null); return; }
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    });
  }
</script>
