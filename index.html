<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f766e">
<title>The Way to English · Book 1 — Professor IA</title>
<style>
  :root{
    --bg:#f7f8fa;
    --surface:#ffffff;
    --ink:#1a1f2e;
    --muted:#8a93a6;
    --line:#eceef3;
    --accent:#0f766e;
    --accent-soft:#e9f4f1;
    --bot:#f1f3f7;
    --err-bg:#fef2f2;
    --err-ink:#b42318;
    --err-line:#fecaca;
    --radius:18px;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 12px 32px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    display:flex;flex-direction:column;height:100dvh;
    max-width:760px;margin:0 auto;background:var(--surface);
    box-shadow:var(--shadow);
  }

  /* ---------- Header ---------- */
  header{
    display:flex;align-items:center;gap:12px;
    padding:14px 20px;border-bottom:1px solid var(--line);
    background:var(--surface);position:relative;z-index:2;
  }
  .avatar{
    width:42px;height:42px;border-radius:50%;flex:none;
    display:grid;place-items:center;color:#fff;font-weight:700;font-size:18px;
    background:linear-gradient(145deg,#0f766e,#14a08a);
    box-shadow:0 4px 12px rgba(15,118,110,.28);
  }
  .head-txt{min-width:0;flex:1}
  .head-txt h1{font-size:15.5px;font-weight:650;letter-spacing:-.01em;line-height:1.2}
  .head-txt p{font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.18)}

  /* ---------- Log ---------- */
  #log{
    flex:1;overflow-y:auto;padding:22px 20px 8px;
    display:flex;flex-direction:column;gap:12px;
    scroll-behavior:smooth;
  }
  #log::-webkit-scrollbar{width:8px}
  #log::-webkit-scrollbar-thumb{background:#e2e5ec;border-radius:8px}
  #log::-webkit-scrollbar-thumb:hover{background:#cfd4de}

  .row{display:flex;width:100%;animation:rise .28s cubic-bezier(.21,.9,.3,1)}
  .row.me{justify-content:flex-end}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .msg{
    max-width:78%;padding:11px 15px;font-size:14.5px;line-height:1.55;
    white-space:pre-wrap;word-wrap:break-word;border-radius:var(--radius);
  }
  .msg.bot{background:var(--bot);color:var(--ink);border-bottom-left-radius:6px}
  .msg.me{background:var(--accent);color:#fff;border-bottom-right-radius:6px}
  .msg.err{background:var(--err-bg);color:var(--err-ink);border:1px solid var(--err-line);border-bottom-left-radius:6px;font-size:13.5px}
  .msg strong{font-weight:650}
  .msg code{background:rgba(15,118,110,.1);padding:1px 5px;border-radius:6px;font-size:.9em;font-family:ui-monospace,Menlo,Consolas,monospace}
  .msg.me code{background:rgba(255,255,255,.18)}
  .msg a{color:inherit;text-decoration:underline}

  /* typing dots */
  .typing{display:inline-flex;gap:4px;align-items:center;padding:14px 16px}
  .typing span{
    width:7px;height:7px;border-radius:50%;background:#9aa3b5;
    animation:blink 1.3s infinite both;
  }
  .typing span:nth-child(2){animation-delay:.18s}
  .typing span:nth-child(3){animation-delay:.36s}
  @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}

  /* ---------- Composer ---------- */
  form{
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);background:var(--surface);
  }
  .bar{
    display:flex;align-items:flex-end;gap:8px;
    background:var(--bg);border:1px solid var(--line);
    border-radius:24px;padding:6px 6px 6px 8px;
    transition:border-color .15s,box-shadow .15s;
  }
  .bar:focus-within{border-color:#cdd9d6;box-shadow:0 0 0 4px var(--accent-soft)}
  #inp{
    flex:1;border:0;background:transparent;resize:none;outline:none;
    font:inherit;font-size:14.5px;line-height:1.5;color:var(--ink);
    padding:9px 4px;max-height:140px;
  }
  #inp::placeholder{color:var(--muted)}

  .icon-btn{
    flex:none;width:42px;height:42px;border:0;border-radius:50%;
    display:grid;place-items:center;cursor:pointer;
    background:transparent;color:var(--muted);transition:.15s;
  }
  .icon-btn:hover{background:#eef0f4;color:var(--ink)}
  .icon-btn svg{width:21px;height:21px}

  #b{background:var(--accent);color:#fff}
  #b:hover{background:#0c635c;color:#fff}
  #b:disabled{background:#cfd6e0;cursor:default}

  #mic.rec{background:#ef4444;color:#fff;animation:pulse 1.4s infinite}
  #mic.rec:hover{background:#dc2626}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.45)}50%{box-shadow:0 0 0 7px rgba(239,68,68,0)}}

  .hint{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}

  @media(max-width:600px){
    .app{box-shadow:none}
    .msg{max-width:85%}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="avatar">W</div>
    <div class="head-txt">
      <h1>The Way to English · Book 1</h1>
      <p><span class="dot"></span> Professor de inglês — escreva ou fale</p>
    </div>
  </header>

  <div id="log"></div>

  <form id="f">
    <div class="bar">
      <button id="mic" class="icon-btn" type="button" title="Falar" aria-label="Gravar áudio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="18" x2="12" y2="22"/>
        </svg>
      </button>
      <textarea id="inp" rows="1" placeholder="Escreva sua mensagem..." autocomplete="off" autofocus></textarea>
      <button id="b" class="icon-btn" type="submit" title="Enviar" aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="hint">Enter envia · Shift+Enter quebra linha</div>
  </form>
</div>

<script>
  const AGENT = "https://n8nn.discloud.app/webhook/agente-ingles";
  const STT   = "https://n8nn.discloud.app/webhook/transcrever";
  const sessionId = "web-" + Date.now() + "-" + Math.random().toString(36).slice(2,8);

  const log  = document.getElementById("log");
  const form = document.getElementById("f");
  const inp  = document.getElementById("inp");
  const btn  = document.getElementById("b");
  const mic  = document.getElementById("mic");

  // ---- minimal & safe markdown (escape first, then bold/italic/code) ----
  function fmt(t){
    return t
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
      .replace(/(^|[\s(])\*([^*\n]+)\*/g,"$1<em>$2</em>")
      .replace(/`([^`]+)`/g,"<code>$1</code>");
  }

  function add(text, cls){
    const row = document.createElement("div");
    row.className = "row " + (cls === "me" ? "me" : "bot");
    const d = document.createElement("div");
    d.className = "msg " + cls;
    if(cls === "bot") d.innerHTML = fmt(text); else d.textContent = text;
    row.appendChild(d); log.appendChild(row);
    log.scrollTop = log.scrollHeight;
    return row;
  }

  function addTyping(){
    const row = document.createElement("div");
    row.className = "row bot";
    row.innerHTML = '<div class="msg bot typing"><span></span><span></span><span></span></div>';
    log.appendChild(row); log.scrollTop = log.scrollHeight;
    return row;
  }

  add("Hello! 👋 Sou seu professor de inglês baseado no livro *The Way to English — Book 1*. Pode escrever ou falar no microfone. What's your name?", "bot");

  // ---- auto-grow textarea ----
  function autogrow(){ inp.style.height = "auto"; inp.style.height = Math.min(inp.scrollHeight,140) + "px"; }
  inp.addEventListener("input", autogrow);
  inp.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); form.requestSubmit(); }
  });

  // ---- send message ----
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = inp.value.trim(); if(!text) return;
    add(text, "me");
    inp.value = ""; autogrow(); btn.disabled = true;
    const typing = addTyping();
    try{
      const r = await fetch(AGENT, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ message:text, sessionId }) });
      if(!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();
      typing.remove(); add(data.response || data.output || "(resposta vazia)", "bot");
    }catch(err){ typing.remove(); add("Não consegui falar com o professor agora. " + err.message, "err"); }
    finally{ btn.disabled = false; inp.focus(); }
  });

  // ---- microfone -> Whisper ----
  let rec=null, chunks=[], recording=false;
  function blobToB64(blob){ return new Promise(res=>{ const fr=new FileReader(); fr.onloadend=()=>res(fr.result.split(",")[1]); fr.readAsDataURL(blob); }); }

  mic.addEventListener("click", async () => {
    if(!recording){
      try{
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        rec = new MediaRecorder(stream); chunks=[];
        rec.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
        rec.onstop = async () => {
          stream.getTracks().forEach(t=>t.stop());
          const blob = new Blob(chunks, {type:"audio/webm"});
          mic.disabled = true; const typing = addTyping();
          try{
            const b64 = await blobToB64(blob);
            const r = await fetch(STT, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ audioBase64:b64, mimeType:"audio/webm" }) });
            if(!r.ok) throw new Error("HTTP " + r.status);
            const data = await r.json(); typing.remove();
            const t = (data.text||"").trim();
            if(t){ inp.value = t; autogrow(); form.requestSubmit(); }
            else { add("Não entendi o áudio, pode repetir?", "err"); }
          }catch(err){ typing.remove(); add("Erro na transcrição: " + err.message, "err"); }
          finally{ mic.disabled = false; }
        };
        rec.start(); recording = true; mic.classList.add("rec"); mic.title = "Parar";
      }catch(err){ add("Sem acesso ao microfone: " + err.message, "err"); }
    } else {
      rec.stop(); recording = false; mic.classList.remove("rec"); mic.title = "Falar";
    }
  });
</script>
</body>
</html>
