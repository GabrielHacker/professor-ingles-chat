<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Way to English - Book 1 | Professor IA</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f6fa;color:#1a1f36}
  .app{display:flex;flex-direction:column;height:100vh;max-width:820px;margin:0 auto;background:#fff;box-shadow:0 0 40px rgba(0,0,0,.06)}
  header{padding:18px 24px;border-bottom:1px solid #e5e8ef;background:linear-gradient(135deg,#0f766e 0%,#1a8f6e 100%);color:#fff}
  header h1{font-size:18px;font-weight:600;margin-bottom:2px}
  header p{font-size:13px;opacity:.85}
  #log{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px}
  .msg{max-width:80%;padding:12px 16px;border-radius:14px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word}
  .msg.bot{align-self:flex-start;background:#eef2f9;border-bottom-left-radius:4px}
  .msg.me{align-self:flex-end;background:#1a8f6e;color:#fff;border-bottom-right-radius:4px}
  .msg.err{align-self:flex-start;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
  .typing{align-self:flex-start;color:#6b7280;font-size:13px;font-style:italic}
  form{display:flex;gap:10px;padding:16px 24px;border-top:1px solid #e5e8ef;background:#fff;align-items:center}
  #inp{flex:1;padding:12px 14px;border:1px solid #cfd6e4;border-radius:10px;font-size:14.5px;outline:none}
  #inp:focus{border-color:#1a8f6e}
  button{padding:0 18px;height:44px;border:0;border-radius:10px;background:#1a8f6e;color:#fff;font-size:14.5px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  #mic{background:#eef2f9;color:#1a1f36;font-size:20px;padding:0 14px}
  #mic.rec{background:#ef4444;color:#fff;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>The Way to English - Book 1</h1>
    <p>Seu professor de ingles - escreva ou fale (microfone)</p>
  </header>
  <div id="log"></div>
  <form id="f">
    <button id="mic" type="button" title="Falar">&#127908;</button>
    <input id="inp" placeholder="Escreva ou use o microfone..." autocomplete="off" autofocus>
    <button id="b" type="submit">Enviar</button>
  </form>
</div>
<script>
  const AGENT = "https://n8nn.discloud.app/webhook/agente-ingles";
  const STT   = "https://n8nn.discloud.app/webhook/transcrever";
  const sessionId = "web-" + Date.now() + "-" + Math.random().toString(36).slice(2,8);
  const log = document.getElementById("log");
  const form = document.getElementById("f");
  const inp = document.getElementById("inp");
  const btn = document.getElementById("b");
  const mic = document.getElementById("mic");

  function add(text, cls){
    const d = document.createElement("div");
    d.className = "msg " + cls; d.textContent = text;
    log.appendChild(d); log.scrollTop = log.scrollHeight; return d;
  }
  add("Hello! Sou seu professor de ingles baseado no livro The Way to English - Book 1. Escreva ou fale no microfone. What's your name?", "bot");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = inp.value.trim(); if(!text) return;
    add(text, "me"); inp.value = ""; btn.disabled = true;
    const typing = add("digitando...", "typing");
    try{
      const r = await fetch(AGENT, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ message:text, sessionId }) });
      if(!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();
      typing.remove(); add(data.response || data.output || "(resposta vazia)", "bot");
    }catch(err){ typing.remove(); add("Erro ao falar com o professor: " + err.message, "err"); }
    finally{ btn.disabled = false; inp.focus(); }
  });

  // ----- microfone -> Whisper -----
  let rec=null, chunks=[], recording=false;
  function blobToB64(blob){ return new Promise(res=>{ const fr=new FileReader(); fr.onloadend=()=>res(fr.result.split(",")[1]); fr.readAsDataURL(blob); }); }
  mic.addEventListener("click", async () => {
    if(!recording){
      try{
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        rec = new MediaRecorder(stream); chunks=[];
        rec.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
        rec.onstop = async () => {
          stream.getTracks().forEach(t=>t.stop());
          const blob = new Blob(chunks, {type:"audio/webm"});
          mic.disabled = true; const typing = add("transcrevendo...", "typing");
          try{
            const b64 = await blobToB64(blob);
            const r = await fetch(STT, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ audioBase64:b64, mimeType:"audio/webm" }) });
            if(!r.ok) throw new Error("HTTP " + r.status);
            const data = await r.json(); typing.remove();
            const t = (data.text||"").trim();
            if(t){ inp.value = t; form.requestSubmit(); } else { add("Nao entendi o audio, tenta de novo.", "err"); }
          }catch(err){ typing.remove(); add("Erro na transcricao: " + err.message, "err"); }
          finally{ mic.disabled = false; }
        };
        rec.start(); recording = true; mic.classList.add("rec"); mic.innerHTML = "&#9209;";
      }catch(err){ add("Sem acesso ao microfone: " + err.message, "err"); }
    } else {
      rec.stop(); recording = false; mic.classList.remove("rec"); mic.innerHTML = "&#127908;";
    }
  });
</script>
</body>
</html>
